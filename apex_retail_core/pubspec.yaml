version: 0.0.1
publish_to: 'none'

environment:
  sdk: ^3.10.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  intl: ^0.20.3
  fl_chart: ^1.2.0
  uuid: ^4.5.3
  http: ^1.6.0
  connectivity_plus: ^6.1.0
  printing: ^5.14.3
  pdf: ^3.12.0
  barcode_widget: ^2.0.4
  barcode: ^2.2.9
  share_plus: ^13.2.0
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
